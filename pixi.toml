[project]
name = "origami-optimization-ebook"
version = "0.1.0"
description = "Numerical optimization through the lens of origami engineering"
channels = ["conda-forge"]
platforms = ["osx-arm64", "win-64"]

[dependencies]
python = "3.12.*"
numpy = ">=1.26"
scipy = ">=1.12"
matplotlib = ">=3.8"
jupyter = ">=1.0"
ipykernel = ">=6.0"
ipympl = ">=0.9"

[tasks]
render     = "quarto render"
render-pdf = "quarto render --to pdf"
preview    = "quarto preview"
kernel     = "python -m ipykernel install --user --name origami-opt --display-name 'Origami Optimization'"
