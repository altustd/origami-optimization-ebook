project:
  type: book
  output-dir: docs

book:
  title: "The Mathematics of Folding"
  subtitle: "Numerical Optimization in Origami Engineering"
  author: "Troy Altus"
  date: "May 2026"
  repo-url: https://github.com/altustd/origami-optimization-ebook
  chapters:
    - preface.qmd
    - part: "Part I: The Geometry of Folds"
      chapters:
        - index.qmd
        - 02-geometry.qmd
        - 03-miura-ori.qmd
    - part: "Part II: Optimization Methods"
      chapters:
        - 04-circle-packing.qmd
        - 05-energy-minimization.qmd
        - 06-inverse-design.qmd
    - references.qmd
  appendices:
    - appendix-a-code.qmd

format:
  html:
    theme: cosmo
    toc: true
    toc-depth: 3
    number-sections: true
    fig-align: center
    code-fold: true
    code-tools: true
    mermaid:
      theme: neutral
  pdf:
    documentclass: book
    classoption: [letterpaper, 11pt]
    geometry:
      - top=1in
      - bottom=1in
      - left=1.25in
      - right=1in
    number-sections: true
    colorlinks: true
    toc: true
    toc-depth: 3
    pdf-engine: latexmk
    pdf-engine-opts:
      - -lualatex

bibliography: references.bib
jupyter: origami-opt

execute:
  warning: false
  message: false
